<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" role="img" aria-labelledby="title desc">
  <title id="title">Auto glass locations guide</title>
  <desc id="desc">Diagram labeling common vehicle glass locations including windshield, door glass, vent glass, quarter glass, and back glass.</desc>
  <rect width="900" height="720" fill="#fff"/>
  <style>.h{font:700 34px Arial,sans-serif;fill:#111}.l{font:700 17px Arial,sans-serif;fill:#111}.s{fill:#f7f7f7;stroke:#111;stroke-width:4}.w{fill:#8dd7ee;stroke:#111;stroke-width:4}.g{stroke:#111;stroke-width:3;fill:none}.a{stroke:#111;stroke-width:3;marker-end:url(#m)}</style>
  <defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#111"/></marker></defs>
  <text class="h" x="28" y="48">LEFT SIDE</text>
  <g transform="translate(105 85)">
    <path class="s" d="M50 130 L95 72 L255 52 L432 66 L520 115 L570 130 L565 182 L65 182 Z"/>
    <path class="w" d="M112 78 L235 60 L214 125 L76 125 Z"/><path class="w" d="M243 60 L355 65 L355 128 L224 128 Z"/><path class="w" d="M366 67 L438 87 L505 126 L366 128 Z"/>
    <circle cx="165" cy="182" r="42" fill="#111"/><circle cx="165" cy="182" r="20" fill="#fff"/><circle cx="475" cy="182" r="42" fill="#111"/><circle cx="475" cy="182" r="20" fill="#fff"/>
    <line class="g" x1="355" y1="65" x2="355" y2="182"/><line class="g" x1="224" y1="128" x2="224" y2="182"/><line class="g" x1="366" y1="128" x2="366" y2="182"/>
    <text class="l" x="35" y="30">LEFT FRONT VENT</text><line class="a" x1="180" y1="35" x2="98" y2="93"/>
    <text class="l" x="245" y="20">LEFT FRONT DOOR</text><line class="a" x1="320" y1="25" x2="280" y2="95"/>
    <text class="l" x="372" y="0">LEFT BACKSEAT DOOR</text><line class="a" x1="445" y1="5" x2="365" y2="96"/>
    <text class="l" x="510" y="45">LEFT QUARTER</text><line class="a" x1="545" y1="50" x2="462" y2="104"/>
  </g>
  <text class="h" x="28" y="305">RIGHT SIDE</text>
  <g transform="translate(105 335)">
    <path class="s" d="M50 130 L95 72 L255 52 L432 66 L520 115 L570 130 L565 182 L65 182 Z"/>
    <path class="w" d="M112 78 L235 60 L214 125 L76 125 Z"/><path class="w" d="M243 60 L355 65 L355 128 L224 128 Z"/><path class="w" d="M366 67 L438 87 L505 126 L366 128 Z"/>
    <circle cx="165" cy="182" r="42" fill="#111"/><circle cx="165" cy="182" r="20" fill="#fff"/><circle cx="475" cy="182" r="42" fill="#111"/><circle cx="475" cy="182" r="20" fill="#fff"/>
    <line class="g" x1="355" y1="65" x2="355" y2="182"/><line class="g" x1="224" y1="128" x2="224" y2="182"/><line class="g" x1="366" y1="128" x2="366" y2="182"/>
    <text class="l" x="35" y="30">RIGHT QUARTER</text><line class="a" x1="150" y1="35" x2="100" y2="96"/>
    <text class="l" x="215" y="10">RIGHT BACK VENT</text><line class="a" x1="275" y1="15" x2="230" y2="94"/>
    <text class="l" x="390" y="15">RIGHT FRONT DOOR</text><line class="a" x1="465" y1="20" x2="405" y2="100"/>
    <text class="l" x="305" y="-15">RIGHT BACKSEAT DOOR</text><line class="a" x1="385" y1="-10" x2="342" y2="92"/>
  </g>
  <g transform="translate(150 595)"><path class="s" d="M70 20 h105 l45 55 v80 h-195 v-80z"/><path class="w" d="M88 30 h70 l25 45 h-120z"/><text class="l" x="45" y="-8">WINDSHIELD</text><line class="a" x1="110" y1="0" x2="122" y2="42"/></g>
  <g transform="translate(585 595)"><path class="s" d="M45 20 h130 l35 55 v80 h-200 v-80z"/><path class="w" d="M63 30 h95 l22 45 h-140z"/><rect x="30" y="85" width="25" height="25" fill="#e32727"/><rect x="166" y="85" width="25" height="25" fill="#e32727"/><text class="l" x="45" y="-8">BACK GLASS</text><line class="a" x1="105" y1="0" x2="112" y2="42"/></g>
</svg>

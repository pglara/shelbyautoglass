<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" role="img" aria-labelledby="title desc">
<title id="title">Vehicle safety system calibration guide</title><desc id="desc">Top view car diagram showing common safety systems that may need calibration after glass replacement.</desc><rect width="900" height="720" fill="#fff"/><style>.t{font:700 23px Arial,sans-serif;fill:#222}.b{font:700 28px Arial,sans-serif;fill:#111}.p{font:16px Arial,sans-serif;fill:#333}.r{fill:#d71920}.z{fill:#d9dde0;opacity:.8}</style><g transform="translate(310 65)"><ellipse class="z" cx="140" cy="65" rx="250" ry="52"/><ellipse class="z" cx="140" cy="320" rx="250" ry="52"/><ellipse class="z" cx="-90" cy="190" rx="60" ry="145"/><ellipse class="z" cx="370" cy="190" rx="60" ry="145"/><path d="M70 95 C86 45 194 45 210 95 L238 280 C220 335 60 335 42 280 Z" fill="#222"/><path d="M92 105 h96 l28 70 h-152z" fill="#e9eef1"/><path d="M65 220 h150 l-10 75 h-130z" fill="#e9eef1"/><text class="t" x="-30" y="55">Blind Spot</text><text class="t" x="-22" y="82">Detection</text><text class="t" x="235" y="55">Around View</text><text class="t" x="242" y="82">Monitoring</text><text class="t" x="-250" y="170">Adaptive Cruise</text><text class="t" x="-236" y="198">Control</text><text class="t" x="420" y="172">Rear Collision</text><text class="t" x="440" y="200">Warning</text><text class="t" x="-45" y="365">Lane Departure</text><text class="t" x="-30" y="393">Warning</text><text class="t" x="230" y="365">Night Vision</text><text class="t" x="245" y="393">System</text></g><g transform="translate(70 500)"><rect class="r" width="54" height="54"/><text x="16" y="37" fill="#fff" font="700 26px Arial">✓</text><text class="b" x="72" y="24">ADAPTIVE CRUISE CONTROL</text><text class="p" x="72" y="49">Sensors may need calibration after windshield work.</text><rect class="r" x="430" width="54" height="54"/><text x="446" y="37" fill="#fff" font="700 26px Arial">↔</text><text class="b" x="502" y="24">LANE DEPARTURE WARNING</text><text class="p" x="502" y="49">Camera alignment helps lane alerts work properly.</text><rect class="r" y="95" width="54" height="54"/><text x="16" y="132" fill="#fff" font="700 26px Arial">◉</text><text class="b" x="72" y="119">AROUND VIEW MONITORING</text><text class="p" x="72" y="144">Multiple cameras support parking and visibility.</text><rect class="r" x="430" y="95" width="54" height="54"/><text x="446" y="132" fill="#fff" font="700 26px Arial">!</text><text class="b" x="502" y="119">BLIND SPOT DETECTION</text><text class="p" x="502" y="144">Calibration supports safety alerts around the car.</text></g></svg>
